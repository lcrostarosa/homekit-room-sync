sync:
  name: Rebuild HomeKit filters
  description: >-
    Recomputes entity filters and room assignments for either all managed
    HomeKit bridges or a specific bridge (identified by its HomeKit config
    entry_id).
  fields:
    entry_id:
      name: Integration entry_id
      description: Limit the sync to a specific homekit_room_sync config entry.
      example: "c1a2b3c4d5e6f7g8h9i0"
      selector:
        text:
    bridge_id:
      name: HomeKit bridge entry_id
      description: >-
        Limit the sync to one HomeKit Bridge (provide the HomeKit config
        entry's entry_id).
      example: "abcd1234efgh5678ijkl"
      selector:
        text:
